services:
  nginx:
    image: nginx:1.29-bookworm
    depends_on:
      - web
      - backend
    ports:
      - "16315:80"
      - "16319:8080"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: .
    env_file:
      - .env.docker
    environment:
      NEXUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      NEXUS_REDIS_URL: redis://redis:6379/0
      NEXUS_CELERY_BROKER_URL: redis://redis:6379/0
      NEXUS_CELERY_RESULT_BACKEND: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nexus-workspaces:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
    command: uv run celery -A src.server.celery.app.celery_app worker --loglevel=INFO
    env_file:
      - .env.docker
    environment:
      NEXUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      NEXUS_REDIS_URL: redis://redis:6379/0
      NEXUS_CELERY_BROKER_URL: redis://redis:6379/0
      NEXUS_CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nexus-workspaces:/workspace
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  nexus-workspaces:
