services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: ${NEXUS_API_STOP_GRACE_PERIOD:-1m}
    env_file: .env.production
    command: ["api"]
    volumes:
      - agent-workspaces:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:6515/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: ${NEXUS_WORKER_STOP_GRACE_PERIOD:-1h}
    env_file: .env.production
    command: ["worker"]
    volumes:
      - agent-workspaces:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  poller:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: ${NEXUS_POLLER_STOP_GRACE_PERIOD:-1m}
    env_file: .env.production
    command: ["poller"]
    volumes:
      - agent-workspaces:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "${NEXUS_HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O - http://127.0.0.1/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  agent-workspaces:
